<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TempoKid — 節拍遊戲</title>
<style>
  :root {
    --bg: #FAF9F5;
    --surface: #FFFFFF;
    --surface-alt: #F1EFE8;
    --border: #D3D1C7;
    --text: #2C2C2A;
    --text-2: #5F5E5A;
    --text-3: #888780;
    --accent: #378ADD;
    --good: #3B6D11;
    --ok: #854F0B;
    --bad: #A32D2D;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: "PingFang TC", "Noto Sans TC", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 1.5rem 1rem;
  }
  main { width: 100%; max-width: 420px; }
  h1 { font-size: 22px; font-weight: 500; text-align: center; margin-bottom: 1.5rem; }
  .screen { display: none; }
  .screen.active { display: block; }
  .back {
    background: none; border: none; cursor: pointer;
    font-size: 14px; color: var(--text-3); padding: 4px 0;
    margin-bottom: 0.5rem; font-family: inherit;
  }
  .mode-card {
    display: block; width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1rem;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
  }
  .mode-card:active { transform: scale(0.98); }
  .mode-card .emoji { font-size: 32px; }
  .mode-card .name { font-size: 18px; font-weight: 500; margin: 6px 0 4px; }
  .mode-card .desc { font-size: 14px; color: var(--text-2); line-height: 1.5; }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 0.5rem; }
  label { font-size: 14px; color: var(--text-2); min-width: 40px; }
  input[type=range] { flex: 1; accent-color: var(--accent); }
  .bpm-out { font-size: 14px; font-weight: 500; min-width: 68px; text-align: right; }
  .tempo-term { text-align: center; font-size: 14px; color: var(--text-3); margin-bottom: 1rem; }
  .dots { display: flex; gap: 10px; justify-content: center; margin-bottom: 1.25rem; height: 20px; align-items: center; }
  .dot {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    transition: background .1s;
  }
  .hider { font-size: 28px; display: none; }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
  .stat {
    background: var(--surface-alt);
    border-radius: var(--radius);
    padding: 1rem;
    text-align: center;
  }
  .stat .lbl { font-size: 13px; color: var(--text-3); }
  .stat .val { font-size: 24px; font-weight: 500; }
  .fb { text-align: center; font-size: 15px; min-height: 24px; margin-bottom: 1rem; color: var(--text-2); }
  button {
    font-family: inherit;
    font-size: 15px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 16px;
    cursor: pointer;
  }
  button:active { transform: scale(0.98); }
  .tap-btn {
    width: 100%; height: 140px;
    font-size: 20px;
    border-radius: 12px;
    margin-bottom: 0.75rem;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
    position: relative;
  }
  .pop {
    position: absolute;
    left: 50%; top: 38%;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 1px;
    white-space: nowrap;
    pointer-events: none;
    animation: popfly .7s ease-out forwards;
  }
  .pop .combo { font-size: 18px; font-weight: 600; }
  .pop .pts { display: block; font-size: 17px; font-weight: 600; text-align: center; }
  .stats-3 { grid-template-columns: 1fr 1fr 1fr; }
  .stats-3 .stat { padding: 0.75rem 0.25rem; }
  .stats-3 .stat .val { font-size: 20px; }
  .total { text-align: center; font-size: 13px; color: var(--text-3); margin-bottom: 1rem; }
  .total b { font-size: 15px; color: var(--text-2); }
  .summary {
    display: none;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
    font-size: 14px;
    font-weight: 600;
    background: var(--surface-alt);
    border-radius: var(--radius);
    padding: 10px;
    margin-bottom: 0.75rem;
  }
  .lane { display: flex; gap: 2px; justify-content: center; margin-bottom: 0.75rem; }
  .cell {
    width: 30px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    background: var(--surface-alt);
    border-radius: 6px;
  }
  .hp { text-align: center; font-size: 18px; letter-spacing: 3px; margin-bottom: 0.5rem; }
  .fever {
    display: none;
    text-align: center;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 0.5rem;
  }
  .chips { display: flex; gap: 8px; justify-content: center; margin-bottom: 0.75rem; min-height: 44px; }
  .chip {
    width: 44px; height: 44px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface-alt);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700;
    transition: all .1s;
  }
  .chip.on   { background: var(--accent); border-color: var(--accent); color: #fff; transform: scale(1.12); }
  .chip.good { background: var(--good);   border-color: var(--good);   color: #fff; }
  .chip.ok   { background: var(--ok);     border-color: var(--ok);     color: #fff; }
  .chip.bad  { background: var(--bad);    border-color: var(--bad);    color: #fff; }
  .pad { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 0.75rem; }
  .pad button {
    height: 96px;
    font-size: 28px; font-weight: 700;
    border-radius: 12px;
    position: relative;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
  }
  #btnPata  { color: #B45309; border-color: #B45309; }
  #btnPon   { color: var(--accent); border-color: var(--accent); }
  #btnChaka { color: var(--good); border-color: var(--good); }
  #btnDon   { color: var(--bad); border-color: var(--bad); }
  .start-wide { width: 100%; margin-bottom: 0.75rem; }
  @keyframes popfly {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(.4); }
    18%  { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
    35%  { transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -150%) scale(1); }
  }
  .center { display: flex; justify-content: center; }
</style>
</head>
<body>
<main>

  <!-- 模式選單 -->
  <section id="menu" class="screen active">
    <h1>TempoKid 節拍遊戲</h1>
    <button class="mode-card" data-go="game1">
      <div class="emoji">🥁</div>
      <div class="name">打拍子挑戰</div>
      <div class="desc">跟著節拍器點，看你多準！PERFECT 連擊衝準確率。</div>
    </button>
    <button class="mode-card" data-go="game2">
      <div class="emoji">🙈</div>
      <div class="name">節拍器躲貓貓</div>
      <div class="desc">節拍器響 4 拍就躲起來。心裡數拍子繼續點，別被抓到！看你能撐幾拍。</div>
    </button>
    <button class="mode-card" data-go="game3">
      <div class="emoji">🐤</div>
      <div class="name">節奏小勇士</div>
      <div class="desc">Patapon 式！四顆鼓（啪碰恰咚），聽 4 拍口令照著打，帶小雞打怪、擋落石、衝終點。</div>
    </button>
  </section>

  <!-- 模式一：打拍子挑戰 -->
  <section id="game1" class="screen">
    <button class="back" data-go="menu">← 回選單</button>
    <h1>打拍子挑戰</h1>

    <div class="row">
      <label for="bpm1">速度</label>
      <input type="range" id="bpm1" min="0" max="29" step="1" value="18">
      <span class="bpm-out" id="bpmOut1">88 BPM</span>
    </div>
    <div class="tempo-term" id="term1">Andante 行板</div>

    <div class="dots" id="dots1"></div>

    <div class="stats stats-3">
      <div class="stat"><div class="lbl">分數</div><div class="val" id="score1">0</div></div>
      <div class="stat"><div class="lbl">連擊</div><div class="val" id="streak1">0</div></div>
      <div class="stat"><div class="lbl">準確率</div><div class="val" id="acc1">--</div></div>
    </div>
    <div class="total">累計總分 <b id="total1">0</b></div>
    <div class="summary" id="sum1"></div>

    <div class="fb" id="fb1">按「開始」，先聽 4 拍，再跟著點</div>

    <button class="tap-btn" id="tapBtn1">開始</button>
    <div class="center"><button id="stopBtn1" style="display:none">結束並看成績</button></div>
  </section>

  <!-- 模式二：節拍器躲貓貓 -->
  <section id="game2" class="screen">
    <button class="back" data-go="menu">← 回選單</button>
    <h1>節拍器躲貓貓</h1>

    <div class="row">
      <label for="bpm2">速度</label>
      <input type="range" id="bpm2" min="0" max="29" step="1" value="18">
      <span class="bpm-out" id="bpmOut2">88 BPM</span>
    </div>
    <div class="tempo-term" id="term2">Andante 行板</div>

    <div class="dots" id="dots2"><span class="hider" id="hider">🙈</span></div>

    <div class="stats">
      <div class="stat"><div class="lbl">撐了幾拍</div><div class="val" id="survived">0</div></div>
      <div class="stat"><div class="lbl">最佳紀錄</div><div class="val" id="best2">0</div></div>
    </div>
    <div class="summary" id="sum2"></div>

    <div class="fb" id="fb2">節拍器響 4 拍後會躲起來，靠自己心裡的拍子點下去！</div>

    <button class="tap-btn" id="tapBtn2">開始</button>
    <div class="center"><button id="stopBtn2" style="display:none">不玩了</button></div>
  </section>

  <!-- 模式三：節奏小勇士（Patapon 式） -->
  <section id="game3" class="screen">
    <button class="back" data-go="menu">← 回選單</button>
    <h1>節奏小勇士</h1>

    <div class="row">
      <label for="bpm3">速度</label>
      <input type="range" id="bpm3" min="0" max="29" step="1" value="18">
      <span class="bpm-out" id="bpmOut3">88 BPM</span>
    </div>
    <div class="tempo-term" id="term3">Andante 行板</div>

    <div class="lane" id="lane"></div>
    <div class="hp" id="hp3">❤️❤️❤️</div>
    <div class="fever" id="fever">🔥 FEVER！分數 ×2 🔥</div>
    <div class="chips" id="chips"></div>

    <div class="stats stats-3">
      <div class="stat"><div class="lbl">分數</div><div class="val" id="score3">0</div></div>
      <div class="stat"><div class="lbl">口令連擊</div><div class="val" id="combo3">0</div></div>
      <div class="stat"><div class="lbl">障礙</div><div class="val" id="mons3">4</div></div>
    </div>
    <div class="total">累計總分 <b id="total3">0</b></div>
    <div class="summary" id="sum3"></div>

    <div class="fb" id="fb3">聽 4 拍口令，照著打回去！啪啪啪碰＝前進</div>

    <div class="pad">
      <button id="btnPata">啪</button>
      <button id="btnPon">碰</button>
      <button id="btnChaka">恰</button>
      <button id="btnDon">咚</button>
    </div>
    <button class="start-wide" id="startBtn3">開始冒險</button>
    <div class="center"><button id="stopBtn3" style="display:none">不玩了</button></div>
  </section>

</main>

<script>
const $ = id => document.getElementById(id);

// ---------- 共用：音效 ----------
let ctx = null;
function ensureCtx() {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  ctx.resume();
}
function click(strong) {
  if (!ctx) return;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.frequency.value = strong ? 880 : 660;
  g.gain.setValueAtTime(0.25, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime + 0.09);
}
function caughtSound() {
  if (!ctx) return;
  [523, 415, 311].forEach((f, i) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    const t0 = ctx.currentTime + i * 0.14;
    o.frequency.value = f;
    g.gain.setValueAtTime(0.22, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.13);
    o.connect(g); g.connect(ctx.destination);
    o.start(t0); o.stop(t0 + 0.14);
  });
}

// ---------- 共用：節拍器刻度與術語 ----------
const TICKS = [40,42,44,46,48,50,52,54,56,58,60,63,66,69,72,76,80,84,88,92,96,100,104,108,112,116,120,126,132,138];
function tempoTerm(v) {
  if (v < 60)  return 'Largo 最緩板';
  if (v < 66)  return 'Larghetto 甚緩板';
  if (v < 76)  return 'Adagio 慢板';
  if (v < 108) return 'Andante 行板';
  if (v < 120) return 'Moderato 中板';
  return 'Allegro 快板';
}
function bindSlider(rangeId, outId, termId, setBpm) {
  $(rangeId).addEventListener('input', e => {
    const v = TICKS[+e.target.value];
    setBpm(v);
    $(outId).textContent = v + ' BPM';
    $(termId).textContent = tempoTerm(v);
  });
}

// ---------- 共用：判定與彈跳字 ----------
const GRADES = [
  { max: 45,  text: 'PERFECT', color: 'var(--accent)', hit: true  },
  { max: 90,  text: 'GREAT',   color: 'var(--good)',   hit: true  },
  { max: 160, text: 'GOOD',    color: 'var(--ok)',     hit: false },
  { max: 1e9, text: 'MISS',    color: 'var(--bad)',    hit: false },
];
// 回傳帶正負的誤差：正 = 拖拍（點在拍點後）、負 = 搶拍（點在拍點前）
function judge(t, beatTimes, bpm) {
  let best = 1e9;
  for (const b of beatTimes) if (Math.abs(t - b) < Math.abs(best)) best = t - b;
  const nb = beatTimes[beatTimes.length - 1] + 60000 / bpm;
  if (Math.abs(t - nb) < Math.abs(best)) best = t - nb;
  return best;
}
function spawnPop(btn, text, color, combo, pts) {
  const el = document.createElement('span');
  el.className = 'pop';
  el.style.color = color;
  el.textContent = text;
  if (combo >= 2) {
    const c = document.createElement('span');
    c.className = 'combo';
    c.textContent = ' ×' + combo;
    el.appendChild(c);
  }
  if (pts > 0) {
    const p = document.createElement('span');
    p.className = 'pts';
    p.textContent = '+' + pts;
    el.appendChild(p);
  }
  el.style.marginLeft = (Math.random() * 24 - 12) + 'px';
  btn.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}
function renderSummary(id, counts) {
  $(id).innerHTML = GRADES.map(g =>
    '<span style="color:' + g.color + '">' + g.text + ' ' + (counts[g.text] || 0) + '</span>'
  ).join('');
  $(id).style.display = 'flex';
}

function makeDots(container) {
  for (let i = 0; i < 4; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    container.appendChild(d);
  }
  return [...container.querySelectorAll('.dot')];
}
function lightDot(dots, b) {
  dots.forEach((d, i) => d.style.background = i === b ? 'var(--accent)' : 'var(--surface-alt)');
}
function resetDots(dots) {
  dots.forEach(d => d.style.background = 'var(--surface-alt)');
}

// ---------- 畫面切換 ----------
document.querySelectorAll('[data-go]').forEach(btn => {
  btn.addEventListener('click', () => {
    g1stop(false); g2stop(false); g3stop(false);
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    $(btn.dataset.go).classList.add('active');
  });
});

// ---------- 模式一：打拍子挑戰 ----------
const POINTS = { PERFECT: 100, GREAT: 60, GOOD: 20, MISS: 0 };
const TOTAL_KEY = 'tempokid-total-score';

function bumpTotal(pts) {
  const oldTotal = +(localStorage.getItem(TOTAL_KEY) || 0);
  const newTotal = oldTotal + pts;
  localStorage.setItem(TOTAL_KEY, newTotal);
  ['total1', 'total3'].forEach(id => { const el = $(id); if (el) el.textContent = newTotal; });
  return { oldTotal, newTotal };
}

let g1 = { running: false, bpm: 88, beatTimes: [], beatIdx: 0, timer: null, streak: 0, results: [], score: 0 };
const dots1 = makeDots($('dots1'));
bindSlider('bpm1', 'bpmOut1', 'term1', v => g1.bpm = v);
$('total1').textContent = localStorage.getItem(TOTAL_KEY) || '0';

function addPoints(grade, streak) {
  const base = POINTS[grade.text];
  if (!base) return 0;
  // 連擊加成：每連 1 次 +10%，最高 2 倍
  const mult = 1 + 0.1 * Math.min(Math.max(streak - 1, 0), 10);
  const pts = Math.round(base * mult / 10) * 10;
  g1.score += pts;
  const { oldTotal, newTotal } = bumpTotal(pts);
  if (Math.floor(newTotal / 1000) > Math.floor(oldTotal / 1000)) {
    $('fb1').textContent = '🎉 累計突破 ' + Math.floor(newTotal / 1000) * 1000 + ' 分！';
    $('fb1').style.color = 'var(--accent)';
  }
  return pts;
}

function g1beat() {
  g1.beatTimes.push(performance.now());
  const b = g1.beatIdx % 4;
  click(b === 0);
  lightDot(dots1, b);
  g1.beatIdx++;
  if (g1.beatIdx === 5) $('fb1').textContent = '跟著點！';
}

$('tapBtn1').addEventListener('click', () => {
  if (!g1.running) {
    ensureCtx();
    g1.running = true;
    g1.beatTimes = []; g1.beatIdx = 0; g1.streak = 0; g1.results = []; g1.score = 0; g1.counts = {};
    $('sum1').style.display = 'none';
    $('score1').textContent = '0';
    $('streak1').textContent = '0';
    $('acc1').textContent = '--';
    $('tapBtn1').textContent = '點這裡打拍子';
    $('stopBtn1').style.display = 'inline-block';
    $('fb1').textContent = '先聽 4 拍…';
    $('fb1').style.color = 'var(--text-2)';
    g1beat();
    g1.timer = setInterval(g1beat, 60000 / g1.bpm);
    return;
  }
  if (g1.beatIdx < 5) return;

  const diff = judge(performance.now(), g1.beatTimes, g1.bpm);
  const err = Math.abs(diff);
  g1.results.push(err);

  const grade = GRADES.find(g => err < g.max);
  g1.counts[grade.text] = (g1.counts[grade.text] || 0) + 1;
  if (grade.hit) g1.streak++; else g1.streak = 0;
  const pts = addPoints(grade, g1.streak);
  spawnPop($('tapBtn1'), grade.text, grade.color, g1.streak, pts);
  $('score1').textContent = g1.score;

  if (grade.hit) {
    if (!$('fb1').textContent.startsWith('🎉')) $('fb1').textContent = '';
  } else {
    $('fb1').textContent = diff < 0 ? '🐢 搶拍了，慢一點' : '🐇 慢半拍了，快一點';
    $('fb1').style.color = 'var(--ok)';
  }

  $('streak1').textContent = g1.streak;
  const hit = g1.results.filter(e => e < 90).length;
  $('acc1').textContent = Math.round(hit / g1.results.length * 100) + '%';
});

function g1stop(showResult) {
  if (!g1.running) return;
  g1.running = false;
  clearInterval(g1.timer);
  $('tapBtn1').textContent = '開始';
  $('stopBtn1').style.display = 'none';
  resetDots(dots1);
  if (showResult && g1.results.length) {
    renderSummary('sum1', g1.counts);
    const hit = g1.results.filter(e => e < 90).length;
    const pct = Math.round(hit / g1.results.length * 100);
    const tail = '，這輪拿了 ' + g1.score + ' 分';
    $('fb1').textContent =
      pct >= 80 ? '準確率 ' + pct + '%' + tail + '，很穩！試試加快速度'
      : pct >= 50 ? '準確率 ' + pct + '%' + tail + '，再多練幾輪'
                  : '準確率 ' + pct + '%' + tail + '，先放慢速度試試';
    $('fb1').style.color = 'var(--text-2)';
  }
}
$('stopBtn1').addEventListener('click', () => g1stop(true));

// ---------- 模式二：節拍器躲貓貓 ----------
const LISTEN_BEATS = 4;       // 先出聲 4 拍（1 小節）
const BEST_KEY = 'tempokid-hide-best';

let g2 = { running: false, bpm: 88, beatTimes: [], beatIdx: 0, timer: null, survived: 0, taps: 0, counts: {} };
const dots2 = makeDots($('dots2'));
bindSlider('bpm2', 'bpmOut2', 'term2', v => g2.bpm = v);
$('best2').textContent = localStorage.getItem(BEST_KEY) || '0';

function setFb2(text, color) {
  $('fb2').textContent = text;
  $('fb2').style.color = color || 'var(--text-2)';
}

function g2beat() {
  g2.beatTimes.push(performance.now());
  const b = g2.beatIdx % 4;

  if (g2.beatIdx < LISTEN_BEATS) {
    click(b === 0);
    lightDot(dots2, b);
  } else {
    if (g2.beatIdx === LISTEN_BEATS) {
      dots2.forEach(d => d.style.display = 'none');
      $('hider').style.display = 'inline';
      setFb2('躲起來了！心裡數拍子，繼續點！', 'var(--accent)');
    }
    // 停手偵測：靜音期落後兩拍沒點 → 被抓到
    if ((g2.beatIdx - LISTEN_BEATS) - g2.taps >= 2) {
      g2caught('你停下來了');
      return;
    }
  }
  g2.beatIdx++;
}

$('tapBtn2').addEventListener('click', () => {
  if (!g2.running) {
    ensureCtx();
    g2.running = true;
    g2.beatTimes = []; g2.beatIdx = 0; g2.survived = 0; g2.taps = 0; g2.counts = {};
    $('sum2').style.display = 'none';
    $('survived').textContent = '0';
    $('hider').style.display = 'none';
    dots2.forEach(d => d.style.display = 'block');
    $('tapBtn2').textContent = '點這裡打拍子';
    $('stopBtn2').style.display = 'inline-block';
    setFb2('聽好喔，4 拍後節拍器就要躲起來…');
    g2beat();
    g2.timer = setInterval(g2beat, 60000 / g2.bpm);
    return;
  }
  if (g2.beatIdx <= LISTEN_BEATS) return;  // 出聲階段先聽就好

  const diff = judge(performance.now(), g2.beatTimes, g2.bpm);
  const err = Math.abs(diff);
  const grade = GRADES.find(g => err < g.max);
  g2.counts[grade.text] = (g2.counts[grade.text] || 0) + 1;

  if (grade.text === 'MISS') { g2caught('拍子偏掉了'); return; }

  g2.taps++;
  g2.survived++;
  spawnPop($('tapBtn2'), grade.text, grade.color, g2.survived);
  $('survived').textContent = g2.survived;

  if (grade.text === 'GOOD') setFb2(diff < 0 ? '小心！搶拍了，慢一點…' : '小心！慢半拍了，快一點…', 'var(--ok)');
  else if (g2.survived % 8 === 0) setFb2('⭐ 撐過 ' + g2.survived + ' 拍了！', 'var(--good)');
});

function g2caught(reason) {
  clearInterval(g2.timer);
  g2.running = false;
  caughtSound();
  renderSummary('sum2', g2.counts);
  spawnPop($('tapBtn2'), '😼 抓到你了！', 'var(--bad)', 0);
  $('hider').style.display = 'none';
  dots2.forEach(d => d.style.display = 'block');
  resetDots(dots2);
  $('tapBtn2').textContent = '再玩一次';
  $('stopBtn2').style.display = 'none';

  const best = +(localStorage.getItem(BEST_KEY) || 0);
  if (g2.survived > best) {
    localStorage.setItem(BEST_KEY, g2.survived);
    $('best2').textContent = g2.survived;
    setFb2('😼 ' + reason + '！撐了 ' + g2.survived + ' 拍 — 新紀錄！', 'var(--good)');
  } else {
    setFb2('😼 ' + reason + '！撐了 ' + g2.survived + ' 拍（最佳 ' + best + '）', 'var(--bad)');
  }
}

function g2stop(showResult) {
  if (!g2.running) return;
  g2.running = false;
  clearInterval(g2.timer);
  $('tapBtn2').textContent = '開始';
  $('stopBtn2').style.display = 'none';
  $('hider').style.display = 'none';
  dots2.forEach(d => d.style.display = 'block');
  resetDots(dots2);
  if (showResult) {
    renderSummary('sum2', g2.counts);
    setFb2('撐了 ' + g2.survived + ' 拍');
  }
}
$('stopBtn2').addEventListener('click', () => g2stop(true));

// ---------- 模式三：節奏小勇士（Patapon 式） ----------
const CMD_MARCH  = { key: 'march',  name: '前進', pat: ['pata', 'pata', 'pata', 'pon'] };
const CMD_ATTACK = { key: 'attack', name: '攻擊', pat: ['pon', 'pon', 'pata', 'pon'] };
const CMD_DEFEND = { key: 'defend', name: '防禦', pat: ['chaka', 'chaka', 'pata', 'pon'] };
const CMD_CHARGE = { key: 'charge', name: '衝鋒', pat: ['don', 'don', 'chaka', 'chaka'] };
const DRUM_TXT = { pata: '啪', pon: '碰', chaka: '恰', don: '咚' };
const OBSTACLE = {
  monster: { emoji: '👾', cmd: CMD_ATTACK, win: '⚔️ 打倒怪物！' },
  rock:    { emoji: '🪨', cmd: CMD_DEFEND, win: '🛡️ 擋住落石！' },
  boss:    { emoji: '👹', cmd: CMD_CHARGE, win: '💥 衝鋒！打飛大魔王！' },
};
const GOAL = 10;

const MAX_HP = 3;
let g3 = { running: false, bpm: 88, timer: null, phase: 'idle', bip: 0, cmd: CMD_MARCH,
           pos: 0, obstacles: {}, combo: 0, fever: false, score: 0, counts: {},
           slots: [], respStart: 0, hp: MAX_HP };

function renderHp() {
  $('hp3').textContent = '❤️'.repeat(g3.hp) + '🖤'.repeat(MAX_HP - g3.hp);
}
bindSlider('bpm3', 'bpmOut3', 'term3', v => g3.bpm = v);
$('total3').textContent = localStorage.getItem(TOTAL_KEY) || '0';

function setFb3(text, color) {
  $('fb3').textContent = text;
  $('fb3').style.color = color || 'var(--text-2)';
}

// 四顆鼓四種音色：啪＝中鼓、碰＝清亮短音、恰＝高音鈸、咚＝大鼓
const DRUM_SOUND = {
  pata:  { wave: 'square',   f0: 300,  f1: 180, dur: 0.12, gain: 0.22 },
  pon:   { wave: 'sine',     f0: 520,  f1: 520, dur: 0.12, gain: 0.32 },
  chaka: { wave: 'triangle', f0: 1250, f1: 900, dur: 0.06, gain: 0.28 },
  don:   { wave: 'sine',     f0: 140,  f1: 70,  dur: 0.20, gain: 0.42 },
};
function drum(s) {
  if (!ctx) return;
  const d = DRUM_SOUND[s];
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = d.wave;
  o.frequency.setValueAtTime(d.f0, ctx.currentTime);
  if (d.f1 !== d.f0) o.frequency.exponentialRampToValueAtTime(d.f1, ctx.currentTime + d.dur);
  g.gain.setValueAtTime(d.gain, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + d.dur);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime + d.dur + 0.01);
}
function tickSoft() {
  if (!ctx) return;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.frequency.value = 500;
  g.gain.setValueAtTime(0.07, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime + 0.06);
}
function winSound() {
  if (!ctx) return;
  [392, 523, 659, 784].forEach((f, i) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    const t0 = ctx.currentTime + i * 0.15;
    o.frequency.value = f;
    g.gain.setValueAtTime(0.22, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.25);
    o.connect(g); g.connect(ctx.destination);
    o.start(t0); o.stop(t0 + 0.26);
  });
}

function renderLane() {
  const lane = $('lane');
  lane.innerHTML = '';
  for (let i = 0; i <= GOAL; i++) {
    const c = document.createElement('div');
    c.className = 'cell';
    const ob = g3.obstacles[i];
    c.textContent = i === g3.pos ? '🐤' : ob ? OBSTACLE[ob].emoji : i === GOAL ? '🚩' : '';
    lane.appendChild(c);
  }
  $('mons3').textContent = Object.keys(g3.obstacles).length;
}
function renderChips() {
  const el = $('chips');
  el.innerHTML = '';
  g3.cmd.pat.forEach(s => {
    const d = document.createElement('div');
    d.className = 'chip';
    d.textContent = DRUM_TXT[s];
    el.appendChild(d);
  });
}
const chipEls = () => [...$('chips').children];

function requiredCmd() {
  const ob = g3.obstacles[g3.pos + 1];
  return ob ? OBSTACLE[ob].cmd : CMD_MARCH;
}

function startCall(now) {
  g3.cmd = requiredCmd();
  g3.phase = 'call';
  g3.bip = 0;
  renderChips();
  setFb3('👂 聽口令：' + g3.cmd.name + '（' + g3.cmd.pat.map(s => DRUM_TXT[s]).join('') + '）');
  callTick(now);
}
function callTick(now) {
  drum(g3.cmd.pat[g3.bip]);
  chipEls().forEach((c, i) => c.classList.toggle('on', i === g3.bip));
  g3.bip++;
  if (g3.bip === 4) {
    g3.phase = 'resp';
    g3.bip = 0;
    g3.slots = [null, null, null, null];
    g3.respStart = now + 60000 / g3.bpm;   // 回打的第 1 拍落點
    setTimeout(() => {
      chipEls().forEach(c => c.className = 'chip');
      setFb3('🥁 換你打！', 'var(--accent)');
    }, 60000 / g3.bpm * 0.5);
  }
}

function g3beat() {
  const now = performance.now();
  if (g3.phase === 'count') {
    if (g3.bip < 4) {
      click(g3.bip === 0);
      setFb3('預備… ' + (4 - g3.bip));
      g3.bip++;
    } else {
      startCall(now);
    }
    return;
  }
  if (g3.phase === 'call') { callTick(now); return; }
  if (g3.phase === 'resp') {
    if (g3.bip < 4) {
      tickSoft();
      chipEls().forEach((c, i) => {
        if (i === g3.bip && c.className === 'chip') c.classList.add('on');
        else if (c.className === 'chip on' && i !== g3.bip) c.className = 'chip';
      });
      g3.bip++;
    } else {
      evaluate(now);
    }
  }
}

function evaluate(now) {
  let ok = true;
  g3.slots.forEach((s, i) => {
    if (!s) {
      ok = false;
      g3.counts.MISS = (g3.counts.MISS || 0) + 1;
      chipEls()[i].className = 'chip bad';
    } else if (!s.pass) {
      ok = false;
    }
  });

  if (ok) {
    g3.combo++;
    g3.fever = g3.combo >= 3;
    $('fever').style.display = g3.fever ? 'block' : 'none';
    const pts = (100 + 20 * Math.min(g3.combo - 1, 5)) * (g3.fever ? 2 : 1);
    g3.score += pts;
    $('score3').textContent = g3.score;
    bumpTotal(pts);
    const ob = g3.obstacles[g3.pos + 1];
    if (g3.cmd.key !== 'march' && ob) {
      setFb3(OBSTACLE[ob].win + ' +' + pts, 'var(--good)');
      delete g3.obstacles[g3.pos + 1];
    } else {
      g3.pos++;
      setFb3('👣 前進！+' + pts, 'var(--good)');
    }
    renderLane();
    if (g3.pos >= GOAL) { g3win(); return; }
  } else {
    g3.combo = 0;
    g3.fever = false;
    $('fever').style.display = 'none';
    g3.hp--;
    renderHp();
    if (g3.pos > 0) g3.pos--;
    renderLane();
    if (g3.hp <= 0) { g3lose(); return; }
    setFb3('💔 沒對上！退一步，再聽一次！', 'var(--bad)');
  }
  $('combo3').textContent = g3.combo;
  startCall(now);
}

function g3lose() {
  clearInterval(g3.timer);
  g3.running = false;
  g3.phase = 'idle';
  caughtSound();
  renderSummary('sum3', g3.counts);
  setFb3('😵 體力用完了！這輪拿了 ' + g3.score + ' 分，再挑戰一次！', 'var(--bad)');
  $('startBtn3').textContent = '再挑戰一次';
  $('startBtn3').style.display = 'block';
  $('stopBtn3').style.display = 'none';
  $('fever').style.display = 'none';
}

function pad(btn) {
  if (!g3.running) return;
  drum(btn);
  if (g3.phase !== 'resp') return;   // 聽口令階段先不判定

  const t = performance.now(), iv = 60000 / g3.bpm;
  let slot = Math.round((t - g3.respStart) / iv);
  if (slot < 0) slot = 0;
  if (slot > 3) slot = 3;
  if (g3.slots[slot]) return;

  const err = t - (g3.respStart + slot * iv);
  const correctBtn = btn === g3.cmd.pat[slot];
  const grade = correctBtn ? GRADES.find(g => Math.abs(err) < g.max) : GRADES[3];
  g3.slots[slot] = { btn, err, pass: correctBtn && grade.text !== 'MISS' };
  g3.counts[grade.text] = (g3.counts[grade.text] || 0) + 1;

  chipEls()[slot].className = 'chip ' + (grade.hit ? 'good' : grade.text === 'GOOD' ? 'ok' : 'bad');
  const PAD_BTN = { pata: 'btnPata', pon: 'btnPon', chaka: 'btnChaka', don: 'btnDon' };
  spawnPop($(PAD_BTN[btn]), grade.text, grade.color, 0, 0);
}
$('btnPata').addEventListener('click', () => pad('pata'));
$('btnPon').addEventListener('click', () => pad('pon'));
$('btnChaka').addEventListener('click', () => pad('chaka'));
$('btnDon').addEventListener('click', () => pad('don'));
const KEY_DRUM = { d: 'pata', f: 'pon', j: 'chaka', k: 'don' };
document.addEventListener('keydown', e => {
  if (!$('game3').classList.contains('active') || e.repeat) return;
  const s = KEY_DRUM[e.key.toLowerCase()];
  if (s) pad(s);
});

function g3start() {
  ensureCtx();
  g3.running = true;
  g3.pos = 0; g3.combo = 0; g3.fever = false; g3.hp = MAX_HP;
  g3.obstacles = { 3: 'monster', 5: 'rock', 7: 'monster', 9: 'boss' };
  g3.score = 0; g3.counts = {}; g3.phase = 'count'; g3.bip = 0;
  renderHp();
  $('sum3').style.display = 'none';
  $('fever').style.display = 'none';
  $('score3').textContent = '0';
  $('combo3').textContent = '0';
  $('chips').innerHTML = '';
  renderLane();
  $('startBtn3').style.display = 'none';
  $('stopBtn3').style.display = 'inline-block';
  g3beat();
  g3.timer = setInterval(g3beat, 60000 / g3.bpm);
}
function g3win() {
  clearInterval(g3.timer);
  g3.running = false;
  g3.phase = 'idle';
  winSound();
  renderSummary('sum3', g3.counts);
  setFb3('🎉 到達終點！這輪拿了 ' + g3.score + ' 分！', 'var(--good)');
  $('startBtn3').textContent = '再玩一次';
  $('startBtn3').style.display = 'block';
  $('stopBtn3').style.display = 'none';
}
function g3stop(showResult) {
  if (!g3.running) return;
  clearInterval(g3.timer);
  g3.running = false;
  g3.phase = 'idle';
  $('startBtn3').textContent = '開始冒險';
  $('startBtn3').style.display = 'block';
  $('stopBtn3').style.display = 'none';
  $('fever').style.display = 'none';
  if (showResult) {
    renderSummary('sum3', g3.counts);
    setFb3('這輪拿了 ' + g3.score + ' 分');
  }
}
$('startBtn3').addEventListener('click', g3start);
$('stopBtn3').addEventListener('click', () => g3stop(true));
renderLane();
</script>
